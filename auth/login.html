<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Solace Sphere</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
<header>
  <img src="../images/logo.png" alt="Solace Sphere logo" class="logo">
  <nav>
    <a href="../landing page.html">Home</a>
    <a href="../patient/dashboard.html">Dashboard</a>
    <a href="../patient/resources.html">Resources</a>
    <a href="../patient/personal toolbox.html">Personal Toolbox</a>
    <a href="../patient/community.html">Community</a>
    <a href="../patient/chatbot.html">Chatbot</a>
    <a href="signup.html" class="signup-link">Sign Up</a>
    <a href="../patient/profile.html" class="profile-link">Profile</a>
  </nav>
</header>

<!-- ================= LOGIN ================= -->
<section class="form-section">
  <div>
    <h1>Welcome Back to Solace Sphere</h1>
    <p style="margin-top:15px;">A calmer mind begins here.</p>
    <img src="../images/loginimg.jfif" style="margin-top:20px;border-radius:20px;width:250px;height:250px;object-fit:cover;">
  </div>

  <div class="form-box auth-form-box">
    <h3>LOGIN</h3>
    <input type="email" id="loginEmail" placeholder="Email">
    <p id="loginEmailStatus" class="field-status" hidden></p>
    <div class="password-field-wrap">
      <input type="password" id="loginPassword" placeholder="Password">
      <button type="button" class="password-toggle-button" data-target="loginPassword" aria-label="Show password" title="Show password">👁</button>
    </div>
    <select id="loginRole" class="form-input" style="margin-top: 14px;">
      <option value="patient" selected>Patient</option>
      <option value="professional">Professional</option>
      <option value="admin">Admin</option>
    </select>
    <p class="password-hint">Demo access only: choose which role you want to test.</p>
    <p style="text-align: right; margin-top: 8px;"><a href="forgot-password.html" style="color: #5f8fe8; text-decoration: none; font-weight: 600; font-size: 14px;">Forgot Password?</a></p>
    <p id="loginMessage" class="auth-message" hidden></p>
    <div style="text-align: center; margin-top: 20px;">
      <button class="btn" id="loginButton" type="button">LOG IN</button>
    </div>
    <p style="text-align: center;">New here? <a href="signup.html" style="color: #5f8fe8; text-decoration: none; font-weight: 600;">Create an account →</a></p>
  </div>
</section>

<div class="note">Take a deep breath. You're doing your best.</div>
<script>
  const loginFields = {
    email: document.getElementById("loginEmail"),
    password: document.getElementById("loginPassword"),
    message: document.getElementById("loginMessage"),
    button: document.getElementById("loginButton")
  };

  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  function setFieldStatus(element, text, type) {
    element.hidden = !text;
    element.textContent = text || "";
    element.className = "field-status" + (type ? " field-status-" + type : "");
  }

  function updateLoginEmailStatus() {
    const email = loginFields.email.value.trim();
    const status = document.getElementById("loginEmailStatus");
    if (!email) {
      setFieldStatus(status, "", "");
      return;
    }
    setFieldStatus(status, isValidEmail(email) ? "Email format looks good." : "Please enter a valid email address.", isValidEmail(email) ? "success" : "error");
  }

  document.querySelectorAll(".password-toggle-button").forEach(function (button) {
    button.addEventListener("click", function () {
      const target = document.getElementById(button.dataset.target);
      if (!target) return;
      const showPassword = target.type === "password";
      target.type = showPassword ? "text" : "password";
      button.textContent = showPassword ? "🙈" : "👁";
      button.setAttribute("aria-label", showPassword ? "Hide password" : "Show password");
      button.setAttribute("title", showPassword ? "Hide password" : "Show password");
    });
  });

  loginFields.email.addEventListener("input", updateLoginEmailStatus);

  function setLoginMessage(text, type) {
    loginFields.message.hidden = !text;
    loginFields.message.textContent = text || "";
    loginFields.message.className = "auth-message" + (type ? " auth-message-" + type : "");
  }

  loginFields.button.addEventListener("click", function () {
    const email = loginFields.email.value.trim();
    const password = loginFields.password.value;
    const role = document.getElementById("loginRole") ? document.getElementById("loginRole").value : "patient";
    const storedProfile = JSON.parse(localStorage.getItem("solaceUserProfile") || "null");

    if (!email || !password) {
      setLoginMessage("Please enter your email and password.", "error");
      return;
    }

    if (!isValidEmail(email)) {
      setLoginMessage("Please enter a valid email address.", "error");
      return;
    }

    // Try server login first; fallback to localStorage for demo/offline
    fetch('../api/login.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password, role: role })
    }).then(r => r.json()).then(result => {
      if (result && result.ok && result.user) {
        localStorage.setItem("solaceCurrentUser", JSON.stringify({
          email: result.user.email,
          displayName: result.user.displayName || email,
          role: result.user.role || role,
          loggedInAt: new Date().toISOString()
        }));
        setLoginMessage("Login successful. Opening your dashboard...", "success");
        window.setTimeout(function () {
          const roleHome = (result.user.role === "professional") ? "../professional/clinician-dashboard.html" : (result.user.role === "admin" ? "../admin/admin-dashboard.html" : "../patient/dashboard.html");
          window.location.href = roleHome;
        }, 500);
      } else {
        // fallback to localStorage demo check
        if (!storedProfile || storedProfile.email !== email || storedProfile.password !== password) {
          setLoginMessage("We couldn't match those details. Try again or create an account.", "error");
          return;
        }
        localStorage.setItem("solaceCurrentUser", JSON.stringify({
          email: storedProfile.email,
          displayName: storedProfile.displayName || storedProfile.name,
          role: role,
          loggedInAt: new Date().toISOString()
        }));
        setLoginMessage("Login successful (fallback). Opening your dashboard...", "success");
        window.setTimeout(function () {
          const roleHome = role === "professional" ? "../professional/clinician-dashboard.html" : role === "admin" ? "../admin/admin-dashboard.html" : "../patient/dashboard.html";
          window.location.href = roleHome;
        }, 500);
      }
    }).catch(() => {
      // network error — fallback to localStorage behavior
      if (!storedProfile || storedProfile.email !== email || storedProfile.password !== password) {
        setLoginMessage("We couldn't match those details. Try again or create an account.", "error");
        return;
      }
      localStorage.setItem("solaceCurrentUser", JSON.stringify({
        email: storedProfile.email,
        displayName: storedProfile.displayName || storedProfile.name,
        role: role,
        loggedInAt: new Date().toISOString()
      }));
      setLoginMessage("Login successful (offline). Opening your dashboard...", "success");
      window.setTimeout(function () {
        const roleHome = role === "professional" ? "../professional/clinician-dashboard.html" : role === "admin" ? "../admin/admin-dashboard.html" : "../patient/dashboard.html";
        window.location.href = roleHome;
      }, 500);
    });
  });
</script>
<script src="../auth.js"></script>
</body>
</html>
